services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpcb-scraper-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "5054:5001"
    depends_on:
      redis:
        condition: service_started
    command: sh -c "npm run migrate && npm run start"

  redis:
    image: redis:7-alpine
    container_name: cpcb-scraper-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: cpcb-scraper-nginx
    restart: unless-stopped
    ports:
      - "5001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  redis_data:

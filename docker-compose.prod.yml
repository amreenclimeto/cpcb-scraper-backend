services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpcb-scraper-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "5054:5054"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npm run migrate && npm run start"

  postgres:
    image: postgres:16-alpine
    container_name: cpcb-scraper-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cpcb_scraper"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cpcb-scraper-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: cpcb-scraper-nginx
    restart: unless-stopped
    ports:
      - "5001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
